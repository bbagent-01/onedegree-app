name: Deploy Trustead Overlay (alpha-c) to Cloudflare Pages

on:
  push:
    branches: [track-b/1db-overlay]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm install

      - name: Generate design-system token usage counts
        run: node scripts/generate-token-usage.mjs

      - name: Build with next-on-pages
        run: npx @cloudflare/next-on-pages
        env:
          # GitHub-hosted runners get OOM-killed by Next's build worker
          # without an explicit heap bump (last-100-kb of brand-presets
          # CSS pushed it over the edge — SIGSEGV in the build worker).
          NODE_OPTIONS: --max-old-space-size=6144
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_APP_URL: https://alpha-c.onedegreebnb.com
          # ALPHA-C ONLY (CC-Dev1): build-time gate for the impersonation
          # mount in src/app/(app)/layout.tsx — without this the static
          # `process.env.NEXT_PUBLIC_ENABLE_IMPERSONATION === "true"` check
          # evaluates to false and webpack dead-code-eliminates the entire
          # ImpersonationMount + ImpersonationSwitcher subtree, so nothing
          # ships. Hardcoded for alpha-c since this env is dev-only.
          NEXT_PUBLIC_ENABLE_IMPERSONATION: "true"
          IMPERSONATION_ADMIN_USER_IDS: user_3C4zII7uz6zXNlsCssm6koi5qiY

      - name: Create Pages project if needed
        run: |
          npx wrangler pages project create onedegree-app-alpha-c --production-branch=track-b/1db-overlay 2>/dev/null || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set environment variables on Pages project
        run: |
          curl -s -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/onedegree-app-alpha-c" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"deployment_configs\":{\"production\":{\"env_vars\":{\"NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY\":{\"type\":\"plain_text\",\"value\":\"${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}\"},\"CLERK_SECRET_KEY\":{\"type\":\"secret_text\",\"value\":\"${{ secrets.CLERK_SECRET_KEY }}\"},\"NEXT_PUBLIC_SUPABASE_URL\":{\"type\":\"plain_text\",\"value\":\"${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}\"},\"NEXT_PUBLIC_SUPABASE_ANON_KEY\":{\"type\":\"plain_text\",\"value\":\"${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}\"},\"SUPABASE_SERVICE_ROLE_KEY\":{\"type\":\"secret_text\",\"value\":\"${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}\"},\"NEXT_PUBLIC_APP_URL\":{\"type\":\"plain_text\",\"value\":\"https://alpha-c.onedegreebnb.com\"},\"NEXT_PUBLIC_ENABLE_IMPERSONATION\":{\"type\":\"plain_text\",\"value\":\"true\"},\"IMPERSONATION_ADMIN_USER_IDS\":{\"type\":\"secret_text\",\"value\":\"user_3C4zII7uz6zXNlsCssm6koi5qiY\"}}}}}"

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy .vercel/output/static --project-name=onedegree-app-alpha-c --branch=track-b/1db-overlay --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Map custom domain
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/onedegree-app-alpha-c/domains" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"alpha-c.onedegreebnb.com"}' || true
